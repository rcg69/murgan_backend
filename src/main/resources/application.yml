spring:
  application:
    name: ecommerce-api

  datasource:
    url: ${DATABASE_URL}
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true
        generate_statistics: false

server:
  port: ${PORT:8080}
security:
  jwt:
    secret: ${SECURITY_JWT_SECRET}
    access-token-ttl-seconds: ${SECURITY_JWT_ACCESS_TOKEN_TTL_SECONDS:900}

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:*}
  bootstrap-admin:
    enabled: ${APP_BOOTSTRAP_ADMIN_ENABLED:true}
    email: ${APP_BOOTSTRAP_ADMIN_EMAIL:admin123@local}
    username: ${APP_BOOTSTRAP_ADMIN_USERNAME:admin123}
    password: ${APP_BOOTSTRAP_ADMIN_PASSWORD:123@admin}